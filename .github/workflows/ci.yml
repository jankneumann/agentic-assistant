name: CI

# Note: `"on"` is quoted because unquoted `on` is parsed as boolean true
# by YAML 1.1, which breaks GitHub Actions workflow detection.
"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Lint + typecheck + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (public repo only — persona submodules are private)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      # Public tests read from tests/fixtures/personas/ directly (via the
      # ASSISTANT_PERSONAS_DIR env var set in tests/conftest.py), so no
      # populate step is needed. See docs/gotchas.md G6 and the
      # test-privacy-boundary OpenSpec change for the full design.

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy src tests

      - name: Pytest
        run: uv run pytest -q
