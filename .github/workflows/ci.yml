name: CI

# Note: `"on"` is quoted because unquoted `on` is parsed as boolean true
# by YAML 1.1, which breaks GitHub Actions workflow detection.
"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Lint + typecheck + test
    runs-on: ubuntu-latest
    env:
      # Belt-and-suspenders: tests/conftest.py also sets this via
      # os.environ.setdefault at module-top, but declaring it at job
      # level means any future static-analysis step that inadvertently
      # loads persona configs will see the fixture root, not an empty
      # submodule mount. See docs/gotchas.md G6 (IR-C4).
      #
      # MUST be absolute. Setting it here makes conftest's
      # os.environ.setdefault a no-op, so this value is the one tests
      # actually use. CLI tests invoke commands inside
      # CliRunner.isolated_filesystem(), which chdirs to a temp dir; a
      # relative path resolves against that temp cwd, persona discovery
      # returns empty, and the CLI exits 2. Absolute survives the chdir.
      ASSISTANT_PERSONAS_DIR: ${{ github.workspace }}/tests/fixtures/personas
    steps:
      - name: Checkout (public repo only — persona submodules are private)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      # Public tests read from tests/fixtures/personas/ directly (via the
      # ASSISTANT_PERSONAS_DIR env var set in tests/conftest.py), so no
      # populate step is needed. See docs/gotchas.md G6 and the
      # test-privacy-boundary OpenSpec change for the full design.

      - name: Ruff
        run: uv run ruff check .

      - name: Architecture ledger drift gate
        run: python scripts/check-architecture-ledger-drift.py

      - name: Mypy
        run: uv run mypy src tests

      - name: Pytest
        run: uv run pytest -q
