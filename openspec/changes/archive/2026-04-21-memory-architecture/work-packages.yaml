schema_version: 1
change_id: memory-architecture

packages:
  - id: wp-db
    name: "Database layer — engine factory, ORM models, Alembic migrations"
    description: >
      AsyncEngine factory with per-persona caching, three ORM models
      (MemoryEntry, Preference, Interaction), Alembic migration
      infrastructure and initial schema migration. Shared test fixtures.
    tasks:
      - "1.1"
      - "1.2"
      - "1.3"
      - "1.4"
      - "1.5"
      - "1.6"
      - "2.1"
      - "2.2"
    priority: 1
    dependencies: []
    scope:
      write_allow:
        - "src/assistant/core/db.py"
        - "src/assistant/core/models.py"
        - "src/assistant/migrations/**"
        - "tests/conftest.py"
        - "tests/test_db.py"
        - "tests/test_memory_models.py"
        - "pyproject.toml"
      read_allow:
        - "**"
    verification: tier_b

  - id: wp-graphiti
    name: "Graphiti client factory — FalkorDB driver integration"
    description: >
      Graphiti client factory with FalkorDriver, per-persona caching,
      env-var credential resolution from persona config.
    tasks:
      - "3.1"
      - "3.2"
    priority: 1
    dependencies:
      - "wp-db"
    scope:
      write_allow:
        - "src/assistant/core/graphiti.py"
        - "tests/test_graphiti_factory.py"
      read_allow:
        - "src/assistant/core/persona.py"
        - "tests/conftest.py"
        - "pyproject.toml"
        - "**"
    verification: tier_b
    notes: >
      Depends on wp-db because task 3.1 requires 1.1 (pyproject.toml
      deps). Starts after wp-db task 1.1 completes; runs parallel with
      wp-db tasks 1.3-2.2.

  - id: wp-manager
    name: "MemoryManager — coordinated Postgres + Graphiti memory"
    description: >
      MemoryManager class with dual-backend read/write coordination,
      graceful degradation, structured Markdown export. Split into
      Postgres-path and Graphiti-path implementations.
    tasks:
      - "4.1"
      - "4.2"
      - "4.3"
      - "4.4"
    priority: 2
    dependencies:
      - "wp-db"
      - "wp-graphiti"
    scope:
      write_allow:
        - "src/assistant/core/memory.py"
        - "tests/test_memory_manager.py"
        - "tests/test_memory_manager_graphiti.py"
      read_allow:
        - "**"
    verification: tier_b

  - id: wp-policy
    name: "PostgresGraphitiMemoryPolicy + CapabilityResolver update"
    description: >
      New MemoryPolicy implementation backed by MemoryManager.
      CapabilityResolver updated to select policy based on database_url.
    tasks:
      - "5.1"
      - "5.2"
      - "5.3"
      - "5.4"
    priority: 3
    dependencies:
      - "wp-manager"
    scope:
      write_allow:
        - "src/assistant/core/capabilities/memory.py"
        - "src/assistant/core/capabilities/resolver.py"
        - "tests/test_postgres_memory_policy.py"
        - "tests/test_resolver_memory_selection.py"
      read_allow:
        - "**"
    verification: tier_b

  - id: wp-cli
    name: "CLI db and export-memory commands"
    description: >
      CLI subcommands for database migration management and memory
      export. Parallel with wp-policy after wp-manager completes.
    tasks:
      - "6.1"
      - "6.2"
    priority: 3
    dependencies:
      - "wp-manager"
      - "wp-db"
    scope:
      write_allow:
        - "src/assistant/cli.py"
        - "tests/test_cli_db.py"
      read_allow:
        - "**"
    verification: tier_b
    notes: >
      Parallel with wp-policy — no shared write_allow paths.

  - id: wp-integration
    name: "Integration, regression tests, and validation"
    description: >
      Update existing tests for backward compatibility, run full
      quality gates, validate OpenSpec artifacts.
    tasks:
      - "7.1"
      - "7.2"
      - "7.3"
      - "7.4"
    priority: 4
    dependencies:
      - "wp-policy"
      - "wp-cli"
    scope:
      write_allow:
        - "tests/test_capabilities.py"
        - "tests/test_memory_policy.py"
        - "tests/test_capability_resolver.py"
      read_allow:
        - "**"
    verification: tier_a
