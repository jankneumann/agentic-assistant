schema_version: 1
change_id: http-tools-layer

defaults:
  auto_loop:
    # Round-1 plan-review added security posture, $ref resolution,
    # content-type handling, and persona schema evolution — expanding
    # the total to ~1200 LOC across six packages (five impl + one
    # integration). Integration package is exempted from
    # max_packages (see complexity_gate._count_impl_packages).
    max_loc: 1800
    max_packages: 5
    max_external_deps: 2

packages:
  # ──────────────────────────────────────────────────────────
  # wp-prep — persona schema evolution + dev deps
  # Runs first. All later packages depend on this.
  # ──────────────────────────────────────────────────────────
  - id: wp-prep
    name: "Persona auth_header schema + dev deps (Phase 0)"
    description: >
      Extend persona.py to accept the structured auth_header dict
      (D11), install pytest-httpserver as a dev dependency, add the
      normalization test, and update fixture personas to exercise
      both the legacy flat form and the structured form. Must land
      before any test phase that depends on pytest-httpserver or the
      new auth_header shape.
    tasks:
      - "0.1"
      - "0.2"
      - "0.3"
      - "0.4"
    priority: 0
    dependencies: []
    scope:
      write_allow:
        - "pyproject.toml"
        - "uv.lock"
        - "src/assistant/core/persona.py"
        - "tests/core/test_persona_auth_header.py"
        - "tests/fixtures/personas/**"
      read_allow:
        - "**"
    locks:
      files:
        - "src/assistant/core/persona.py"
        - "pyproject.toml"
        - "uv.lock"
      keys:
        - "deps:pyproject"
        - "core:persona:tool_sources"
      ttl_minutes: 90
      reason: >
        Changes PersonaConfig.tool_sources shape and adds a dev
        dependency. Every downstream package reads the new shape and
        imports pytest-httpserver.
    verification: tier_b
    metadata:
      loc_estimate: 90
      external_deps:
        - pytest-httpserver
        - openapi-spec-validator

  # ──────────────────────────────────────────────────────────
  # wp-http-tools-leaves — independent leaf modules (no internal deps)
  # Runs after wp-prep; wp-http-tools-composite and wp-policy depend on it.
  # ──────────────────────────────────────────────────────────
  - id: wp-http-tools-leaves
    name: "http_tools leaf modules: auth, openapi, registry"
    description: >
      Implement the three independent leaf modules of the http_tools
      package (auth.py, openapi.py, registry.py) along with their unit
      tests. Also seeds the http_tools package __init__.py (exporting
      only the leaf symbols per D8 — composite modules are NOT imported
      here) and the tests/http_tools/ package (including conftest.py
      for the pytest-httpserver fixture). Verifies contract fixtures
      authored at plan time and adds two new fixtures (cyclic + external
      $ref) from tasks 1.6 and 1.7.
    tasks:
      - "1.1"
      - "1.2"
      - "1.3"
      - "1.4"
      - "1.5"
      - "1.6"
      - "1.7"
      - "2.1"
      - "2.2"
      - "2.3"
      - "3.1"
      - "3.2"
      - "3.3"
      - "3.4"
      - "3.5"
      - "5.1"
      - "5.2"
    priority: 1
    dependencies:
      - wp-prep
    scope:
      write_allow:
        - "src/assistant/http_tools/__init__.py"
        - "src/assistant/http_tools/auth.py"
        - "src/assistant/http_tools/openapi.py"
        - "src/assistant/http_tools/registry.py"
        - "tests/http_tools/__init__.py"
        - "tests/http_tools/conftest.py"
        - "tests/http_tools/test_auth.py"
        - "tests/http_tools/test_openapi.py"
        - "tests/http_tools/test_registry.py"
        - "openspec/changes/http-tools-layer/contracts/fixtures/cyclic_ref_openapi.json"
        - "openspec/changes/http-tools-layer/contracts/fixtures/external_ref_openapi.json"
      read_allow:
        - "**"
    locks:
      files:
        - "src/assistant/http_tools/__init__.py"
      keys:
        - "package:http_tools:leaves"
      ttl_minutes: 120
      reason: >
        Owns the http_tools package __init__.py for the leaf-module
        exports; downstream packages are denied write access to it
        (per D8) so eager re-export of composite symbols cannot break
        the DAG import invariant.
    verification: tier_b
    metadata:
      loc_estimate: 380
      external_deps: []

  # ──────────────────────────────────────────────────────────
  # wp-http-tools-composite — builder + discovery
  # Parallel with wp-policy after wp-http-tools-leaves.
  # ──────────────────────────────────────────────────────────
  - id: wp-http-tools-composite
    name: "http_tools composite modules: builder, discovery"
    description: >
      Implement the composite modules that depend on the leaves:
      builder.py (runtime Pydantic generation + StructuredTool
      construction) and discovery.py (orchestrates fetch + parse +
      build per source). Includes the end-to-end integration test
      against pytest-httpserver, the Swagger 2.0 skip-with-warning
      test, the HTTP client security posture tests (redirect refused,
      oversized response, timeout, credential-redacted logs), the
      missing-auth-env skip test, and the builder content-type /
      tool-name / path-encoding tests. **Does NOT modify `__init__.py`**
      (per D8): downstream consumers import discovery symbols via
      `from assistant.http_tools.discovery import discover_tools`.
    tasks:
      - "4.1"
      - "4.2"
      - "4.3"
      - "4.4"
      - "4.5"
      - "4.6"
      - "6.1"
      - "6.2"
      - "6.3"
      - "6.4"
      - "6.5"
      - "6.6"
    priority: 2
    dependencies:
      - wp-http-tools-leaves
    scope:
      write_allow:
        - "src/assistant/http_tools/builder.py"
        - "src/assistant/http_tools/discovery.py"
        - "tests/http_tools/test_builder.py"
        - "tests/http_tools/test_discovery.py"
      read_allow:
        - "**"
      deny:
        - "src/assistant/http_tools/__init__.py"
    locks:
      files:
        - "src/assistant/http_tools/builder.py"
        - "src/assistant/http_tools/discovery.py"
      keys:
        - "package:http_tools:composite"
      ttl_minutes: 120
      reason: >
        Composite modules depend on the leaf APIs finalized in
        wp-http-tools-leaves. Locked to prevent mid-flight API drift
        between the leaves and their consumers. __init__.py ownership
        is explicitly denied here per D8 — eager re-export of
        composite symbols would break package imports between DAG
        merge points.
    verification: tier_b
    metadata:
      loc_estimate: 430
      external_deps: []  # pytest-httpserver installed in wp-prep

  # ──────────────────────────────────────────────────────────
  # wp-policy — extend DefaultToolPolicy + CapabilityResolver
  # Parallel with wp-http-tools-composite after wp-http-tools-leaves.
  # ──────────────────────────────────────────────────────────
  - id: wp-policy
    name: "DefaultToolPolicy + CapabilityResolver extension"
    description: >
      Extend DefaultToolPolicy to accept an optional http_tool_registry
      and merge its tools with extension-provided tools; thread the
      registry through CapabilityResolver construction. Only depends on
      the registry type from wp-http-tools-leaves, so runs in parallel
      with wp-http-tools-composite.
    tasks:
      - "7.1"
      - "7.2"
      - "7.3"
    priority: 2
    dependencies:
      - wp-http-tools-leaves
    scope:
      write_allow:
        - "src/assistant/core/capabilities/tools.py"
        - "src/assistant/core/capabilities/resolver.py"
        - "tests/core/capabilities/test_tool_policy.py"
        - "tests/core/capabilities/test_tool_policy_http.py"
      read_allow:
        - "**"
    locks:
      files:
        - "src/assistant/core/capabilities/tools.py"
        - "src/assistant/core/capabilities/resolver.py"
      keys:
        - "capability:tool_policy:interface"
        - "capability:resolver:constructor"
      ttl_minutes: 120
      reason: >
        Modifies the DefaultToolPolicy constructor signature and
        CapabilityResolver.__init__ parameters. Concurrent changes to
        either file would conflict on the constructor-parameter shape.
    verification: tier_b
    metadata:
      loc_estimate: 140
      external_deps: []

  # ──────────────────────────────────────────────────────────
  # wp-cli — CLI startup wiring + --list-tools flag
  # Depends on both composite and policy.
  # ──────────────────────────────────────────────────────────
  - id: wp-cli
    name: "CLI discovery wiring + --list-tools subcommand"
    description: >
      Remove the pre-P3 "HTTP tool discovery deferred to P2" warning,
      call discover_tools at CLI startup within an `async with
      httpx.AsyncClient(...)` block (D2, D9), pass the resulting
      registry through CapabilityResolver, and add a new --list-tools
      flag that runs discovery and prints a per-source tool catalog.
      All CLI-discovery tests live in `tests/test_cli.py` — no
      `tests/http_tools/test_cli_list_tools.py` file is created (the
      prior mention in proposal.md §6 was an early sketch; consolidated
      here).
    tasks:
      - "8.1"
      - "8.2"
      - "8.3"
      - "8.4"
    priority: 3
    dependencies:
      - wp-http-tools-composite
      - wp-policy
    scope:
      write_allow:
        - "src/assistant/cli.py"
        - "tests/test_cli.py"
      read_allow:
        - "**"
    locks:
      files:
        - "src/assistant/cli.py"
      keys:
        - "cli:entry-point"
        - "cli:flag:--list-tools"
      ttl_minutes: 120
      reason: >
        Modifies the CLI entry point and adds a new group-level flag.
        Conflicts with any other feature that touches cli.py (none
        currently in flight).
    verification: tier_b
    metadata:
      loc_estimate: 210
      external_deps: []

  # ──────────────────────────────────────────────────────────
  # wp-integration — pyproject + docs + full suite + validate
  # Final serial step; depends on wp-cli.
  # ──────────────────────────────────────────────────────────
  - id: wp-integration
    task_type: integration
    name: "Integration: docs, final validation, smoke test"
    description: >
      Runtime deps were landed in wp-prep. This package confirms clean
      final state, updates CLAUDE.md "What's Not Yet Wired", updates
      the roadmap status for P3, and runs the full test suite + ruff
      + openspec validate --strict. Optionally adds
      openapi-spec-validator if task 1.5 needs it.
    tasks:
      - "9.1"
      - "9.2"
      - "10.1"
      - "10.2"
      - "11.1"
      - "11.2"
      - "11.3"
      - "11.4"
    priority: 5
    dependencies:
      - wp-cli
    scope:
      write_allow:
        - "pyproject.toml"
        - "uv.lock"
        - "CLAUDE.md"
        - "openspec/roadmap.md"
      read_allow:
        - "**"
    locks:
      files:
        - "pyproject.toml"
        - "uv.lock"
      keys:
        - "deps:pyproject"
      ttl_minutes: 60
      reason: >
        May add openapi-spec-validator dev dep; regenerates uv.lock.
    verification: tier_a
    metadata:
      loc_estimate: 30
      external_deps: []
