schema_version: 1
change_id: observability
tier: coordinated

# Four packages with clear bounded scopes:
#   wp-contracts   -- the telemetry module itself (Protocol, factory, providers, config, sanitize)
#   wp-hooks       -- all hook integrations (harness + delegation + memory + graphiti + extensions + http_tools)
#   wp-devops      -- docker-compose + docs + Claude Code Stop hook wiring notes
#   wp-integration -- cross-package integration tests + final quality gates
#
# DAG:    wp-contracts  ->  wp-hooks  ->  wp-integration
#              +--->  wp-devops  ---+
#
# wp-devops can run in parallel with wp-hooks (no file overlap).

packages:

  - id: wp-contracts
    name: "Telemetry module foundation"
    description: >
      Ship the src/assistant/telemetry/ package: ObservabilityProvider Protocol,
      noop + langfuse providers, factory with 3-level graceful degradation,
      TelemetryConfig dataclass, sanitize regex chain, context var for
      persona/role propagation, atexit flush hook, pyproject.toml [telemetry]
      extra. No call sites outside the telemetry module itself.
    tasks:
      - "1.1"
      - "1.2"
      - "1.3"
      - "1.4"
      - "1.5"
      - "1.6"
      - "1.7"
      - "1.8"
      - "1.9"
      - "1.10"
      - "1.11"
      - "1.12"
      - "1.13"
      - "1.14"
      - "1.15"
      - "1.16"
      - "1.17"
      - "1.18"
    priority: 1
    dependencies: []
    scope:
      # write_allow lists EXPLICIT test files that belong to the telemetry
      # module's own unit tests (Phase 1). Test files for hook integrations
      # (decorators, tool_wrap, memory_hooks, graphiti_hooks, extension_hooks,
      # http_tool_hooks) are owned by wp-hooks; the docker-compose test is
      # owned by wp-devops; the cross-package integration tests are owned by
      # wp-integration. This prevents scope overlap on tests/telemetry/.
      write_allow:
        - "src/assistant/telemetry/**"
        - "pyproject.toml"
        - "tests/telemetry/__init__.py"
        - "tests/telemetry/conftest.py"
        - "tests/telemetry/test_config.py"
        - "tests/telemetry/test_protocol.py"
        - "tests/telemetry/test_noop.py"
        - "tests/telemetry/test_noop_perf.py"
        - "tests/telemetry/test_sanitize.py"
        - "tests/telemetry/test_context.py"
        - "tests/telemetry/test_langfuse.py"
        - "tests/telemetry/test_factory.py"
        - "tests/telemetry/test_flush_hook.py"
      read_allow:
        - "src/**"
        - "tests/**"
        - "openspec/**"
      deny:
        - "src/assistant/harnesses/**"
        - "src/assistant/delegation/**"
        - "src/assistant/core/memory.py"
        - "src/assistant/core/graphiti.py"
        - "src/assistant/core/capabilities/**"
        - "src/assistant/extensions/**"
        - "src/assistant/http_tools/**"
        - "tests/telemetry/test_decorators.py"
        - "tests/telemetry/test_tool_wrap.py"
        - "tests/telemetry/test_memory_hooks.py"
        - "tests/telemetry/test_graphiti_hooks.py"
        - "tests/telemetry/test_extension_hooks.py"
        - "tests/telemetry/test_http_tool_hooks.py"
        - "tests/telemetry/test_docker_compose.py"
        - "tests/telemetry/test_cli_span_emission.py"
        - "tests/telemetry/test_privacy_compliance.py"
        - "tests/telemetry/test_fixture_sentinel.py"
        - "personas/**"
    locks:
      files:
        - "src/assistant/telemetry"
        - "pyproject.toml"
      keys:
        - "module:telemetry"
        - "dep:langfuse"
      ttl_minutes: 180
      reason: "Foundation module and dep declaration — must complete before any hook wiring can compile"
    verification: tier_b

  - id: wp-hooks
    name: "Hook integrations across core, extensions, and http_tools"
    description: >
      Apply @traced_harness and @traced_delegation decorators, wire
      set_assistant_ctx at CLI startup, add trace_memory_op calls to
      MemoryStore and GraphitiClient, wrap every StructuredTool from
      Extension.as_langchain_tools() and from http_tools.builder with
      trace_tool_call. No changes to the telemetry module itself (just
      imports from it).
    tasks:
      - "2.1"
      - "2.2"
      - "2.3"
      - "2.4"
      - "2.5"
      - "2.6"
      - "2.7"
      - "3.1"
      - "3.2"
      - "3.3"
      - "3.4"
      - "3.5"
      - "3.6"
      - "3.7"
      - "3.8"
      - "3.9"
    priority: 2
    dependencies:
      - wp-contracts
    scope:
      # NOTE: src/assistant/telemetry/decorators.py and tool_wrap.py are
      # CREATED here by wp-hooks (they live in the telemetry module but
      # exist specifically for hook integration; see session-log decision
      # on hooks-package cohesion). wp-contracts owns the rest of
      # src/assistant/telemetry/ and explicitly denies these two files so
      # there is no write overlap. Tasks 2.2, 2.5, and 3.6 all write
      # decorators.py/tool_wrap.py — they must be sequenced within the
      # package (they share files).
      write_allow:
        - "src/assistant/harnesses/**"
        - "src/assistant/delegation/**"
        - "src/assistant/core/memory.py"
        - "src/assistant/core/graphiti.py"
        - "src/assistant/core/capabilities/tools.py"
        - "src/assistant/extensions/**"
        - "src/assistant/http_tools/**"
        - "src/assistant/cli.py"
        - "src/assistant/telemetry/decorators.py"
        - "src/assistant/telemetry/tool_wrap.py"
        - "tests/telemetry/test_decorators.py"
        - "tests/telemetry/test_tool_wrap.py"
        - "tests/telemetry/test_memory_hooks.py"
        - "tests/telemetry/test_graphiti_hooks.py"
        - "tests/telemetry/test_extension_hooks.py"
        - "tests/telemetry/test_http_tool_hooks.py"
      read_allow:
        - "src/**"
        - "tests/**"
        - "openspec/**"
      deny:
        - "personas/**"
        - "docker-compose.langfuse.yml"
        - "src/assistant/telemetry/providers/**"
        - "src/assistant/telemetry/factory.py"
        - "src/assistant/telemetry/config.py"
        - "src/assistant/telemetry/sanitize.py"
        - "src/assistant/telemetry/context.py"
        - "src/assistant/telemetry/flush_hook.py"
        - "src/assistant/telemetry/__init__.py"
    locks:
      files:
        - "src/assistant/harnesses/base.py"
        - "src/assistant/harnesses/deep_agents.py"
        - "src/assistant/harnesses/sdk/deep_agents.py"
        - "src/assistant/delegation/spawner.py"
        - "src/assistant/core/memory.py"
        - "src/assistant/core/graphiti.py"
        - "src/assistant/core/capabilities/tools.py"
        - "src/assistant/extensions/base.py"
        - "src/assistant/http_tools/builder.py"
        - "src/assistant/cli.py"
        - "src/assistant/telemetry/decorators.py"
        - "src/assistant/telemetry/tool_wrap.py"
      keys:
        - "span:harness-invoke"
        - "span:delegation-delegate"
        - "span:memory-op"
        - "span:tool-call"
        - "file:telemetry-decorators"
        - "file:telemetry-tool-wrap"
      ttl_minutes: 240
      reason: "Cross-boundary hook integration touching 9+ files; must be atomic to avoid partial coverage. Tasks 2.2/2.5/3.6 serialize within the package on decorators.py + tool_wrap.py."
    verification: tier_b

  - id: wp-devops
    name: "Docker, docs, and Claude Code Stop hook wiring"
    description: >
      Create docker-compose.langfuse.yml with LANGFUSE_INIT_* env vars for
      zero-config local dev, write docs/observability.md (quickstart +
      privacy notes + Stop hook pointer to agent-coordinator), update
      README. Does NOT touch src/ or tests/.
    tasks:
      - "4.1"
      - "4.2"
      - "4.3"
      - "4.4"
    priority: 2
    dependencies:
      - wp-contracts
    scope:
      write_allow:
        - "docker-compose.langfuse.yml"
        - "docs/observability.md"
        - "README.md"
        - "tests/telemetry/test_docker_compose.py"
      read_allow:
        - "docs/**"
        - "openspec/**"
        - "src/**"
      deny:
        - "src/**"
        - "personas/**"
    locks:
      files:
        - "docker-compose.langfuse.yml"
        - "docs/observability.md"
        - "README.md"
      keys:
        - "infra:langfuse-compose"
      ttl_minutes: 120
      reason: "Dev infrastructure and user-facing docs"
    verification: tier_c

  - id: wp-integration
    name: "Integration tests and full-suite validation"
    description: >
      Cross-package integration tests: CLI span emission under scripted
      interaction, privacy-guard compliance, fixture sentinel non-leakage.
      Run full quality gates and openspec strict validation. Add optional
      CI smoke test for live Langfuse round-trip.
    tasks:
      - "5.1"
      - "5.2"
      - "5.3"
      - "5.4"
      - "5.5"
    priority: 3
    dependencies:
      - wp-hooks
      - wp-devops
    scope:
      write_allow:
        - "tests/telemetry/test_cli_span_emission.py"
        - "tests/telemetry/test_privacy_compliance.py"
        - "tests/telemetry/test_fixture_sentinel.py"
        - ".github/workflows/**"
      read_allow:
        - "**"
      deny:
        - "personas/**"
        - "src/**"
    locks:
      files:
        - ".github/workflows"
      keys:
        - "ci:workflows"
      ttl_minutes: 90
      reason: "Integration-only; CI workflow edits"
    verification: tier_a
